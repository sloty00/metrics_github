<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Métricas sloty00</title>
    <!-- Incluimos Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 2rem; background: #f4f4f9; }
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 1.5rem; 
        }
        .stat-card { 
            background: white; 
            padding: 1.5rem; 
            border-radius: 8px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden; 
        }
        .stat-card p { 
            word-wrap: break-word; 
            overflow-wrap: break-word;
            font-weight: bold;
        }
        /* Contenedor específico para los gráficos */
        .chart-wrapper { height: 250px; width: 100%; margin-bottom: 1rem; }
        footer { margin-top: 3rem; text-align: center; color: #666; font-size: 0.9rem; }
        .badges { margin-top: 10px; display: flex; justify-content: center; gap: 8px; }
    </style>
</head>
<body>
    <h1>Dashboard de Métricas</h1>
    <h2>Metricas en tiempo real</h2>

    <!-- Estos son los dos contenedores para los gráficos -->
    <div class="stats-grid" style="margin-bottom: 2rem;">
        <div class="stat-card">
            <h3>Habilidades (Progreso)</h3>
            <div class="chart-wrapper"><canvas id="barChart"></canvas></div>
        </div>
        <div class="stat-card">
            <h3>Dominancia</h3>
            <div class="chart-wrapper"><canvas id="pieChart"></canvas></div>
        </div>
    </div>

    <!-- El script inyectará las tarjetas aquí (tu lógica original) -->
    <div id="dashboard-container" class="stats-grid">Cargando datos desde GitHub...</div>

    <footer>
        <p>&copy; 2026 sloty00. Todos los derechos reservados.</p>
        <div class="badges">
            <img src="https://img.shields.io/badge/GitHub%20API-Data-black?logo=github" alt="GitHub API">
            <img src="https://img.shields.io/badge/Python-Automation-blue?logo=python" alt="Python">
            <img src="https://img.shields.io/badge/Frontend-JavaScript-yellow?logo=javascript" alt="JavaScript">
            <img src="https://img.shields.io/badge/Deploy-GitHub%20Pages-green?logo=githubpages" alt="GitHub Pages">
        </div>
    </footer>
    <script src="app.js"></script>
</body>
</html>
