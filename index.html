<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Métricas sloty00</title>
    <!-- Vinculación del nuevo archivo CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- Incluimos Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<main>
    <h1>Dashboard de Métricas</h1>

    <!-- Sección de Gráficos -->
    <section>
        <h2>Métricas en tiempo real</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Habilidades (Progreso)</h3>
                <div class="chart-wrapper"><canvas id="barChart"></canvas></div>
            </div>
            <div class="stat-card">
                <h3>Dominancia</h3>
                <div class="chart-wrapper"><canvas id="pieChart"></canvas></div>
            </div>
        </div>
    </section>

    <!-- Sección inyectada por app.js -->
    <section id="dashboard-container">
        <p>Cargando datos desde GitHub...</p>
    </section>

    <!-- Sección de Trofeos -->
    <section class="trophies-section">
        <h3>Mis Trofeos de GitHub</h3>
        <img src="https://github-trophies.vercel.app/?username=sloty00&theme=transparent&no-frame=false&no-bg=false&margin-w=4&rank=A,AA,AAA,S,SS,SSS" 
             alt="Trofeos de sloty00" 
             style="max-width: 100%; height: auto;">
    </section>
</main>

<footer>
    <p>&copy; 2026 sloty00. Todos los derechos reservados.</p>
    <div class="badges" style="display: flex; justify-content: center; gap: 8px; margin-top: 10px;">
        <img src="https://img.shields.io/badge/GitHub%20API-Data-black?logo=github" alt="GitHub API">
        <img src="https://img.shields.io/badge/Python-Automation-blue?logo=python" alt="Python">
        <img src="https://img.shields.io/badge/Frontend-JavaScript-yellow?logo=javascript" alt="JavaScript">
        <img src="https://img.shields.io/badge/Deploy-GitHub%20Pages-green?logo=githubpages" alt="GitHub Pages">
    </div>
</footer>

<script src="app.js"></script>
</body>
</html>
