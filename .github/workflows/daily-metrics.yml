name: Daily Metrics Update
on:
  schedule:
    - cron: '0 0 * * *' # Se ejecuta todos los días a las 00:00 UTC
  workflow_dispatch:    # Permite ejecutarlo manualmente desde el botón "Run workflow"
jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with: 
          python-version: '3.x'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Run collector script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/collect_data.py
        
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/metrics.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update daily metrics" && git push)
